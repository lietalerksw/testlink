        const App = () => {
            const [screen, setScreen] = useState('intro'); // 'intro', 'quiz', 'end'
            const [currentIndex, setCurrentIndex] = useState(0);
            const [userAnswers, setUserAnswers] = useState(Array(quizData.length).fill(''));

            const renderImage = (source, altText) => {
                if (!source) return null;
                
                // HTTP/HTTPS 로 시작하거나 data:image 로 시작하면 실제 이미지(GIF 포함) 태그로 렌더링
                if (source.startsWith('http://') || source.startsWith('https://') || source.startsWith('data:image')) {
                    
                    // 구글 드라이브 링크 호환성 처리 (file/d/, open?id=, uc?id=, uc?export=view 등)
                    let imgSrc = source;
                    const gdriveRegex = /(?:drive\.google\.com\/(?:file\/d\/|open\?id=|uc\?id=|uc\?export=view&id=))([a-zA-Z0-9_-]+)/;
                    const match = source.match(gdriveRegex);
                    
                    if (match && match[1]) {
                        // 최근 구글 드라이브 보안 정책으로 uc?export=view가 막히는 현상이 있어 thumbnail API로 우회합니다.
                        // sz=w1000 은 이미지 가로 해상도를 1000px로 가져오라는 의미입니다. (원본 비율 유지)
                        imgSrc = `https://drive.google.com/thumbnail?id=${match[1]}&sz=w1000`;
                    }

                    return (
                        <div className="w-full flex justify-center mb-6">
                            <img 
                                src={imgSrc} 
                                alt={altText} 
                                className="max-w-full h-auto max-h-64 object-contain rounded-xl shadow-sm border border-gray-200"
                            />
                        </div>
                    );
                }
                
                // URL이 아닌 단순 텍스트인 경우 (플레이스홀더)
                return (
                    <div className="bg-gray-100 w-full h-48 md:h-64 rounded-xl mb-6 flex flex-col items-center justify-center border-2 border-dashed border-gray-300 p-4 text-center">
                        <svg className="w-10 h-10 text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <span className="text-sm font-medium text-gray-500">{source}</span>
                    </div>
                );
            };

                setCurrentIndex(0);
                setUserAnswers(Array(quizData.length).fill(''));
                setShowAnswer(false);
                setInputValue('');

            const handleCheckAnswer = () => {
                const newAnswers = [...userAnswers];

                setUserAnswers(newAnswers);

                    setInputValue(userAnswers[currentIndex + 1] || '');
                    // Focus input on next tick
                    setTimeout(() => inputRef.current && inputRef.current.focus(), 10);
                } else {
                    setScreen('end');
                }
            };

            const handlePrevQuestion = () => {
                if (currentIndex > 0) {
                    setCurrentIndex(currentIndex - 1);
                    setShowAnswer(false);
                    setInputValue(userAnswers[currentIndex - 1] || '');
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    if (!showAnswer) {
                        handleCheckAnswer();
                    }
                }
            };

            // Render Intro Screen
            if (screen === 'intro') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white rounded-2xl shadow-xl max-w-lg w-full p-8 text-center border-t-8 border-[#00AEEF]">
                            
                            {/* 인트로 이미지 렌더링 영역 */}
                            {introImageURL ? (
                                <div className="mb-6">
                                    {renderImage(introImageURL, "인트로 메인 이미지")}
                                </div>
                            ) : (
                                <div className="mb-6 flex justify-center">
                                    <div className="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-12 w-12 text-[#00AEEF]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                        </svg>
                                    </div>
                                </div>
                            )}

                            <h1 className="text-3xl font-black text-gray-800 mb-2 tracking-tight">블루아카이브 모의고사</h1>
                            <p className="text-gray-500 font-medium mb-6">히카리 블아 1회 정모 (全知)</p>
                            
                            <div className="bg-gray-50 rounded-xl p-4 mb-8 text-left text-sm text-gray-600 space-y-2 border border-gray-100">
                                <p><strong>주의사항:</strong></p>
                                <ul className="list-disc pl-5 space-y-1">
                                    <li>제작당시 (26년 7월) 한섭 기준입니다.</li>
                                    <li>학생이라면 실장된 학생을 기준으로 작성해주세요.</li>
                                    <li>그 외는 등장한 인물 기준입니다.</li>
                                    <li>시즈널(이격)은 복수정답 인정됩니다.</li>
                                </ul>
                            </div>

                            <button 
                                onClick={startQuiz}
                                className="w-full ba-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition-transform transform hover:-translate-y-1 text-lg"
                            >
                                모의고사 시작하기
                            </button>
                        </div>
                    </div>
                );
            }

            // Render Quiz Screen (Question View & Answer View)
            if (screen === 'quiz') {
                const q = quizData[currentIndex];
                const progress = ((currentIndex + 1) / quizData.length) * 100;

                // 정답 화면 (전체 화면으로 전환)
                if (showAnswer) {
                    return (
                        <div className="min-h-screen flex flex-col max-w-4xl mx-auto p-4 md:p-8">
                            {/* Header & Progress */}
                            <div className="mb-8">
                                <div className="flex justify-between items-end mb-2">
                                    <span className="text-sm font-bold ba-text-primary">
                                        {q.isPractice ? '연습문제 해설' : `해설: Question ${q.id} of ${quizData.length - 1}`}
                                    </span>
                                    <span className="text-xs text-gray-500">{Math.round(progress)}% 완료</span>
                                </div>
                                <div className="w-full bg-gray-200 rounded-full h-2.5">
                                    <div className="ba-primary h-2.5 rounded-full transition-all duration-300" style={{ width: `${progress}%` }}></div>
                                </div>
                            </div>

                            {/* Full-Screen Answer Card */}
                            <div className="bg-white rounded-2xl shadow-lg border-t-8 border-green-500 p-6 md:p-10 flex-grow mb-6 flex flex-col items-center">
                                <h2 className="text-2xl md:text-3xl font-black text-gray-800 mb-6">정답 확인</h2>

                                {/* Answer Image (Larger display) */}
                                {q.answerImage && (
                                    <div className="w-full mb-8 flex justify-center">
                                        {renderImage(q.answerImage, "정답/해설 이미지")}
                                    </div>
                                )}

                                {/* Correct Answer Box */}
                                <div className="w-full bg-green-50 rounded-2xl p-8 mb-8 text-center border border-green-100 shadow-inner">
                                    <span className="text-green-600 font-bold mb-2 block">모범 답안</span>
                                    <p className="text-2xl md:text-3xl font-bold text-gray-900 whitespace-pre-line leading-snug">{q.answer}</p>
                                </div>

                                {/* User's Answer Box */}
                                <div className="w-full bg-gray-50 rounded-xl p-6 border border-gray-200 text-center">
                                    <span className="text-sm font-bold text-gray-500 mb-2 block">내가 입력한 답안</span>
                                    <p className={`text-lg md:text-xl font-medium ${!userAnswers[currentIndex] ? 'text-gray-400 italic' : 'text-gray-800'}`}>
                                        {userAnswers[currentIndex] || '미입력'}
                                    </p>
                                </div>
                            </div>

                            {/* Navigation */}
                            <div className="flex gap-4">
                                <button 
                                    onClick={handleNextQuestion}
                                    autoFocus
                                    className="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-5 rounded-2xl shadow-xl transition-transform active:scale-95 text-lg"
                                >
                                    {currentIndex === quizData.length - 1 ? '모의고사 종료' : '다음 문제 진행'}
                                </button>
                            </div>
                        </div>
                    );
                }

                // 문제 푸는 화면 (Question View)
                return (
                    <div className="min-h-screen flex flex-col max-w-3xl mx-auto p-4 md:p-8">
                        {/* Header & Progress */}
                        <div className="mb-8">
                            <div className="flex justify-between items-end mb-2">
                                <span className="text-sm font-bold ba-text-primary">
                                    {q.isPractice ? '연습문제' : `Question ${q.id} of ${quizData.length - 1}`}
                                </span>
                                <span className="text-xs text-gray-500">{Math.round(progress)}% 완료</span>
                            </div>
                            <div className="w-full bg-gray-200 rounded-full h-2.5">
                                <div className="ba-primary h-2.5 rounded-full transition-all duration-300" style={{ width: `${progress}%` }}></div>
                            </div>
                        </div>

                        {/* Question Card */}
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 flex-grow mb-6">
                            <h2 className="text-xl md:text-2xl font-bold text-gray-800 mb-4 whitespace-pre-line leading-relaxed">
                                {q.question}
                            </h2>
                            
                            {/* Image Placeholder or Actual Image */}
                            {renderImage(q.questionImage, "문제 이미지")}

                            {q.hint && (
                                <div className="bg-blue-50 border-l-4 border-[#00AEEF] p-4 rounded-r-lg mb-6">
                                    <p className="text-sm text-blue-800 font-medium">{q.hint}</p>
                                </div>
                            )}

                            {/* Answer Input Section */}
                            <div className="mt-8">
                                <label className="block text-sm font-bold text-gray-700 mb-2">정답 입력</label>
                                <input 
                                    ref={inputRef}
                                    type="text" 
                                    value={inputValue}
                                    onChange={(e) => setInputValue(e.target.value)}
                                    onKeyDown={handleKeyDown}
                                    placeholder="정답을 입력해주세요"
                                    className="w-full bg-gray-50 border border-gray-300 text-gray-900 text-lg rounded-xl focus:ring-[#00AEEF] focus:border-[#00AEEF] block p-4 outline-none transition-shadow"
                                    autoFocus
                                />
                            </div>
                        </div>

                        {/* Navigation */}
                        <div className="flex justify-between items-center gap-4">
                            <button 
                                onClick={handlePrevQuestion}
                                disabled={currentIndex === 0}
                                className={`px-6 py-4 rounded-xl font-bold transition-colors ${currentIndex === 0 ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-white text-gray-700 shadow-sm hover:bg-gray-50 border border-gray-200'}`}
                            >
                                이전 문제
                            </button>
                            
                            <button 
                                onClick={handleCheckAnswer}
                                className="flex-grow ba-primary text-white font-bold py-4 rounded-xl shadow-md transition-transform active:scale-95"
                            >
                                정답 확인
                            </button>
                        </div>
                    </div>
                );
            }

            // Render End Screen
            if (screen === 'end') {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                        <div className="bg-white rounded-2xl shadow-xl max-w-lg w-full p-10 text-center border-t-8 border-[#00AEEF]">
                            <div className="mb-6 flex justify-center">
                                <div className="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-12 w-12 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                                    </svg>
                                </div>
                            </div>
                            <h2 className="text-3xl font-black text-gray-800 mb-4 tracking-tight">수고하셨습니다!</h2>
                            <p className="text-gray-500 font-medium mb-8">모든 문제 풀이가 끝났습니다.<br/>블아 모의고사에 참여해주셔서 감사합니다.</p>
                            
                            <button 
                                onClick={startQuiz}
                                className="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-4 rounded-xl shadow-lg transition-transform transform hover:-translate-y-1"
                            >
                                처음부터 다시 풀기
                            </button>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
